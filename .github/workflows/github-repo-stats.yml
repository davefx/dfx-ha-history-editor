name: GitHub Repo Stats

on:
  schedule:
    # Run daily near end of day UTC to capture the most complete traffic data.
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  repo-stats:
    name: Collect repo stats
    runs-on: ubuntu-latest
    steps:
      - name: Run github-repo-stats
        uses: jgehrcke/github-repo-stats@v1.4.2
        with:
          ghtoken: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
