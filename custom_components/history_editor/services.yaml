get_records:
  name: Get History Records
  description: Retrieve history records for an entity from the database.
  fields:
    entity_id:
      name: Entity ID
      description: The entity to retrieve history records for.
      required: true
      selector:
        entity:
    start_time:
      name: Start Time
      description: Optional start time for filtering records.
      required: false
      selector:
        datetime:
    end_time:
      name: End Time
      description: Optional end time for filtering records.
      required: false
      selector:
        datetime:
    limit:
      name: Limit
      description: Maximum number of records to return (default 100).
      required: false
      default: 100
      selector:
        number:
          min: 1
          max: 1000

update_record:
  name: Update History Record
  description: Update an existing history record in the database.
  fields:
    state_id:
      name: State ID
      description: The ID of the state record to update.
      required: true
      selector:
        number:
          min: 1
    state:
      name: State
      description: New state value.
      required: false
      selector:
        text:
    attributes:
      name: Attributes
      description: New attributes as JSON object.
      required: false
      selector:
        object:
    last_changed:
      name: Last Changed
      description: New last_changed timestamp.
      required: false
      selector:
        datetime:
    last_updated:
      name: Last Updated
      description: New last_updated timestamp.
      required: false
      selector:
        datetime:

delete_record:
  name: Delete History Record
  description: Delete a history record from the database.
  fields:
    state_id:
      name: State ID
      description: The ID of the state record to delete.
      required: true
      selector:
        number:
          min: 1

create_record:
  name: Create History Record
  description: Create a new history record in the database.
  fields:
    entity_id:
      name: Entity ID
      description: The entity ID for the new record.
      required: true
      selector:
        entity:
    state:
      name: State
      description: State value for the new record.
      required: true
      selector:
        text:
    attributes:
      name: Attributes
      description: Attributes as JSON object.
      required: false
      selector:
        object:
    last_changed:
      name: Last Changed
      description: Timestamp for last_changed (defaults to now).
      required: false
      selector:
        datetime:
    last_updated:
      name: Last Updated
      description: Timestamp for last_updated (defaults to now).
      required: false
      selector:
        datetime:

recalculate_statistics:
  name: Recalculate Statistics
  description: >
    Force recalculation of short-term and/or long-term statistics for an entity
    over a given time range. Short-term (5-minute) statistics are recalculated from
    the underlying state history records; long-term (hourly) statistics are
    recalculated by re-aggregating the short-term statistics.
  fields:
    entity_id:
      name: Entity ID
      description: The entity whose statistics should be recalculated.
      required: true
      selector:
        entity:
    start_time:
      name: Start Time
      description: Start of the time range to recalculate.
      required: true
      selector:
        datetime:
    end_time:
      name: End Time
      description: End of the time range to recalculate.
      required: true
      selector:
        datetime:
    statistic_type:
      name: Statistic Type
      description: >
        Which statistics to recalculate: 'short_term' (5-minute periods from state
        history), 'long_term' (hourly periods from short-term statistics), or 'both'
        (short-term first, then long-term). Defaults to 'both'.
      required: false
      default: both
      selector:
        select:
          options:
            - both
            - short_term
            - long_term

bulk_update_record:
  name: Bulk Update History Records
  description: >
    Apply the same field overrides (state, attributes, timestamps) to multiple
    state history records in a single transaction. Affected statistics periods
    are recalculated once at the end of the batch.
  fields:
    state_ids:
      name: State IDs
      description: List of state record IDs to update.
      required: true
      selector:
        object:
    state:
      name: State
      description: New state value (applied to every selected record).
      required: false
      selector:
        text:
    attributes:
      name: Attributes
      description: New attributes as JSON object (replaces existing on every selected record).
      required: false
      selector:
        object:
    last_changed:
      name: Last Changed
      description: New last_changed timestamp (applied to every selected record).
      required: false
      selector:
        datetime:
    last_updated:
      name: Last Updated
      description: New last_updated timestamp (applied to every selected record).
      required: false
      selector:
        datetime:

bulk_delete_record:
  name: Bulk Delete History Records
  description: >
    Delete multiple state history records in a single transaction. Affected
    statistics periods are recalculated once at the end of the batch.
  fields:
    state_ids:
      name: State IDs
      description: List of state record IDs to delete.
      required: true
      selector:
        object:

bulk_update_statistic:
  name: Bulk Update Statistics
  description: >
    Apply the same column overrides to multiple statistics rows. Each row is
    independently checked against the source-data guard; rows that have
    underlying state history (short-term) or underlying short-term rows
    (long-term) are reported as blocked and skipped without aborting the batch.
  fields:
    ids:
      name: Statistic IDs
      description: List of statistics row IDs to update.
      required: true
      selector:
        object:
    statistic_type:
      name: Statistic Type
      description: Which table the IDs refer to. Defaults to 'long_term'.
      required: false
      default: long_term
      selector:
        select:
          options:
            - long_term
            - short_term
    mean:
      name: Mean
      description: New mean value (applied to every selected row).
      required: false
      selector:
        number:
          mode: box
          step: any
    min:
      name: Min
      description: New minimum value.
      required: false
      selector:
        number:
          mode: box
          step: any
    max:
      name: Max
      description: New maximum value.
      required: false
      selector:
        number:
          mode: box
          step: any
    sum:
      name: Sum
      description: >
        New running-total value. For totaliser sensors, setting this uniformly
        across rows breaks the running-total invariant; consider single-row edits
        with the sum cascade instead.
      required: false
      selector:
        number:
          mode: box
          step: any
    state:
      name: State
      description: New last-known state value.
      required: false
      selector:
        number:
          mode: box
          step: any

bulk_delete_statistic:
  name: Bulk Delete Statistics
  description: >
    Delete multiple statistics rows in a single transaction. Source-data
    guards apply per row; blocked rows are reported and skipped.
  fields:
    ids:
      name: Statistic IDs
      description: List of statistics row IDs to delete.
      required: true
      selector:
        object:
    statistic_type:
      name: Statistic Type
      description: Which table the IDs refer to. Defaults to 'long_term'.
      required: false
      default: long_term
      selector:
        select:
          options:
            - long_term
            - short_term
